name: AuroraIPTV
options:
  bundleIdPrefix: com.kingpickz
  deploymentTarget:
    iOS: "15.0"
targets:
  AuroraIPTV:
    type: application
    platform: iOS
    sources: [AuroraIPTV]
    info:
      path: AuroraIPTV/Info.plist
      properties:
        CFBundleDisplayName: Aurora IPTV
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.kingpickz.aurora
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: "1"

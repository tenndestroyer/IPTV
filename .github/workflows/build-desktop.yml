name: Build Desktop
# Electron wrapper of the KINGZ web app → Windows .exe, macOS .dmg, Linux .AppImage, published to the v1.0.0 Release.
on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop-electron/**'
      - '.github/workflows/build-desktop.yml'
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build installer
        working-directory: desktop-electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm install
          npx electron-builder --publish never
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find desktop-electron/dist -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) \
            -exec cp {} dist/ \; || true
          ls -la dist || true
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: KINGZ IPTV
          files: dist/*
          fail_on_unmatched_files: false

name: Build Desktop
# Electron wrapper → Windows .exe, macOS .dmg (x64 + arm64), Linux .AppImage, published to the v1.0.0 Release.
# Auto code-signs / notarizes when cert secrets are present (see SIGNING.md); unsigned (sideload) otherwise.
on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop-electron/**'
      - '.github/workflows/build-desktop.yml'
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build installer
        working-directory: desktop-electron
        # Per-platform signing env (set the matching repo secrets to enable — see SIGNING.md). The mac cert is
        # only exposed on macOS and the win cert only on Windows, so neither leaks into the other's job.
        env:
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          WIN_CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Disable signing everywhere except macOS-with-a-cert, so unsigned builds still succeed.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK != '') && 'true' || 'false' }}
        run: |
          npm install
          npx electron-builder --publish never
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find desktop-electron/dist -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) \
            -exec cp {} dist/ \; || true
          ls -la dist || true
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: KINGZ IPTV
          files: dist/*
          fail_on_unmatched_files: false

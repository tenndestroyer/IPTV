name: Build iOS (simulator, unsigned)
on: [workflow_dispatch]
# Builds for the iOS Simulator with no signing (proves it compiles). For App Store you set your
# Team in Xcode (or add signing secrets) and Archive. Uses XcodeGen to create the project from project.yml.
jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apple
        run: xcodegen generate
      - name: Build (simulator)
        working-directory: apple
        run: |
          xcodebuild -project AuroraIPTV.xcodeproj -scheme AuroraIPTV \
            -sdk iphonesimulator -configuration Release \
            CODE_SIGNING_ALLOWED=NO build

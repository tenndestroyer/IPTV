name: Release (installable apps)
# Push a tag like v1.0.0 (or run manually) → publishes a GitHub Release with directly-installable apps:
# Windows .msi/.exe, macOS .dmg, Linux .AppImage/.deb, and a sideloadable Android .apk.
# No app-store account is needed to distribute this way — users download and install.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Build installers
        run: |
          cd desktop-tauri
          npm install
          npx tauri icon https://kingpickz.com/iptv/icon.svg || true
          npx tauri build
      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p dist
          find desktop-tauri/src-tauri/target/release/bundle -type f \
            \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} dist/ \; || true
          ls -la dist || true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: true
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli
      - name: Build TWA (debug-signed APK — sideloadable, no Play account needed)
        working-directory: android-twa
        run: |
          bubblewrap init --manifest https://kingpickz.com/iptv/manifest.json --directory . <<'ANS' || true
ANS
          bubblewrap build --skipPwaValidation || true
          mkdir -p ../dist && cp *.apk ../dist/ 2>/dev/null || true
          ls -la ../dist || true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          fail_on_unmatched_files: false
